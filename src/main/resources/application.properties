spring.application.name=ashram-media-platform-backend
server.port=${PORT:8081}

# Database Configuration (Defaults to local H2 file database, overrides via environment variables for PostgreSQL)
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/ashram_media_db;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# JPA / Hibernate Configuration
spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 Console (for development review)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Authentication Properties
jwt.secret=${JWT_SECRET:SriChakraYogaSacredSecretKeyForJwtAuthentication2026!}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS Configuration
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000}

# Demo Data Seeding Configuration (Gated conditional: true only in local dev/testing)
app.seed-demo-data=${SEED_DEMO_DATA:false}

# Production Error Handling (Never leak stacktraces or exception classes to clients)
server.error.include-stacktrace=never
server.error.include-message=always
server.error.include-exception=false
server.error.include-binding-errors=always

# Multipart File Upload Limits (For Video & Photo Uploads)
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
